name: Cloudflare Workers CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate worker syntax
        run: node --check src/worker-vless.js

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && secrets.CLOUDFLARE_API_TOKEN != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy

  deploy-skip-notice:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && secrets.CLOUDFLARE_API_TOKEN == ''
    steps:
      - name: Missing deploy secrets
        run: |
          echo "Cloudflare deploy skipped: set CLOUDFLARE_API_TOKEN in GitHub Secrets."
