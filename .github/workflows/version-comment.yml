name: Add Version Comment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version header in worker files
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          now="$(date -u '+%Y-%m-%d %H:%M:%S')"
          header="// <!--GAMFC-->version base on commit ${SHA}, time is ${now} UTC<!--GAMFC-END-->\."

          update_file() {
            local file="$1"
            if head -n 1 "$file" | grep -q '^// <!--GAMFC-->'; then
              tail -n +2 "$file" > "$file.tmp"
              {
                echo "$header"
                cat "$file.tmp"
              } > "$file"
              rm -f "$file.tmp"
            else
              {
                echo "$header"
                cat "$file"
              } > "$file.tmp"
              mv "$file.tmp" "$file"
            fi
          }

          update_file src/worker-vless.js
          update_file src/worker-with-socks5-experimental.js

      - name: Commit version update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add src/worker-vless.js src/worker-with-socks5-experimental.js
          git commit -m "Update version headers"
          git push
